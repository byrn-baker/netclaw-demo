# NetShell MCP Policy: DevNet Content Search
# Cisco DevNet API documentation search

version: 1
mcp_server: devnet-content-search
description: DevNet Content Search - Meraki API docs, Catalyst Center API docs, operation lookup

# Network egress rules
network_policies:
  egress:
    - name: devnet-mcp
      host: "devnet.cisco.com"
      ports: [443]
      protocols: [https]
      methods: [GET, POST]

# Tool permissions - all read-only documentation search
tools:
  Meraki-API-Doc-Search:
    permission: allow
    requires_approval: false
    audit_level: standard
    description: Search Meraki API documentation

  CatalystCenter-API-Doc-Search:
    permission: allow
    requires_approval: false
    audit_level: standard
    description: Search Catalyst Center API documentation

  Meraki-API-OperationId-Search:
    permission: allow
    requires_approval: false
    audit_level: standard
    description: Lookup specific Meraki operation by ID

# No dangerous patterns - read-only documentation search
dangerous_patterns: []

# No credentials required - public API
credentials: []
