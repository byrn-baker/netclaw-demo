# NetShell MCP Policy: Aruba CX
# HPE Aruba CX switch management

version: 1
mcp_server: aruba-cx-mcp
description: Aruba CX - system info, interfaces, VLANs, routing, LLDP, config management

# Network egress rules
network_policies:
  egress:
    # Aruba CX switches - internal network devices
    - name: aruba-cx-targets
      host: "${ARUBA_CX_TARGETS}"
      ports: [443, 80]
      protocols: [https, http]
      methods: [GET, POST, PUT, PATCH, DELETE]

    # Common internal networks for switches
    - name: internal-rfc1918-10
      host: "10.0.0.0/8"
      ports: [443, 80]
      protocols: [https, http]

    - name: internal-rfc1918-172
      host: "172.16.0.0/12"
      ports: [443, 80]
      protocols: [https, http]

    - name: internal-rfc1918-192
      host: "192.168.0.0/16"
      ports: [443, 80]
      protocols: [https, http]

# Tool permissions
tools:
  # Read tools - no approval required
  aruba_get_system_info:
    permission: allow
    requires_approval: false
    audit_level: standard
    description: Get switch system information

  aruba_get_interfaces:
    permission: allow
    requires_approval: false
    audit_level: standard

  aruba_get_interface:
    permission: allow
    requires_approval: false
    audit_level: standard

  aruba_get_vlans:
    permission: allow
    requires_approval: false
    audit_level: standard

  aruba_get_vlan:
    permission: allow
    requires_approval: false
    audit_level: standard

  aruba_get_routing_table:
    permission: allow
    requires_approval: false
    audit_level: standard

  aruba_get_lldp_neighbors:
    permission: allow
    requires_approval: false
    audit_level: standard

  aruba_get_mac_table:
    permission: allow
    requires_approval: false
    audit_level: standard

  aruba_get_running_config:
    permission: allow
    requires_approval: false
    audit_level: standard

  aruba_get_dom_info:
    permission: allow
    requires_approval: false
    audit_level: standard
    description: Get DOM/transceiver diagnostics

  aruba_get_vsf_topology:
    permission: allow
    requires_approval: false
    audit_level: standard

  # Write tools - REQUIRE APPROVAL (ITSM gated)
  aruba_create_vlan:
    permission: allow
    requires_approval: true
    audit_level: full
    description: Create a VLAN

  aruba_delete_vlan:
    permission: allow
    requires_approval: true
    audit_level: full
    description: Delete a VLAN

  aruba_update_interface:
    permission: allow
    requires_approval: true
    audit_level: full
    description: Update interface configuration

  aruba_save_config:
    permission: allow
    requires_approval: true
    audit_level: full
    description: Save running config to startup

  aruba_firmware_update:
    permission: allow
    requires_approval: true
    audit_level: full
    description: Initiate ISSU firmware update

# Dangerous patterns
dangerous_patterns:
  - pattern: "erase.*startup"
    description: "Erasing startup config"
  - pattern: "reload"
    description: "Reloading switch"
  - pattern: "boot.*system"
    description: "Changing boot image"
  - pattern: "no.*vlan.*1"
    description: "Deleting default VLAN"

# Credentials required
credentials:
  - ARUBA_CX_TARGETS
  - ARUBA_CX_CONFIG
