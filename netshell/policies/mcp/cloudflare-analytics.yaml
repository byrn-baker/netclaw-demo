# NetShell MCP Policy: Cloudflare Analytics
# Traffic analytics and insights

version: 1
mcp_server: cloudflare-analytics
description: Cloudflare Analytics - traffic, bandwidth, requests, cache

# Network egress rules
network_policies:
  egress:
    - name: cloudflare-api
      host: "api.cloudflare.com"
      ports: [443]
      protocols: [https]
      methods: [GET, POST]

    - name: cloudflare-mcp
      host: "mcp.cloudflare.com"
      ports: [443]
      protocols: [https]
      methods: [GET, POST]

# Tool permissions - read-only analytics
tools:
  cloudflare_get_traffic_analytics:
    permission: allow
    requires_approval: false
    audit_level: standard

  cloudflare_get_bandwidth_analytics:
    permission: allow
    requires_approval: false
    audit_level: standard

  cloudflare_get_request_analytics:
    permission: allow
    requires_approval: false
    audit_level: standard

  cloudflare_get_cache_analytics:
    permission: allow
    requires_approval: false
    audit_level: standard

  cloudflare_get_performance_analytics:
    permission: allow
    requires_approval: false
    audit_level: standard

  cloudflare_get_error_analytics:
    permission: allow
    requires_approval: false
    audit_level: standard

  cloudflare_get_geo_analytics:
    permission: allow
    requires_approval: false
    audit_level: standard

# No dangerous patterns - read-only analytics
dangerous_patterns: []

# Credentials required
credentials:
  - CLOUDFLARE_API_TOKEN
  - CLOUDFLARE_ACCOUNT_ID
