# NetShell MCP Policy: Terraform Cloud
# Infrastructure as Code management

version: 1
mcp_server: terraform-mcp
description: Terraform Cloud - workspaces, runs, state, variables, policies

# Network egress rules
network_policies:
  egress:
    - name: terraform-cloud
      host: "app.terraform.io"
      ports: [443]
      protocols: [https]
      methods: [GET, POST, PUT, PATCH, DELETE]

    - name: terraform-enterprise
      host: "${TFC_HOST:-app.terraform.io}"
      ports: [443]
      protocols: [https]
      methods: [GET, POST, PUT, PATCH, DELETE]

    - name: terraform-registry
      host: "registry.terraform.io"
      ports: [443]
      protocols: [https]
      methods: [GET]

# Tool permissions
tools:
  # Read tools - no approval required
  terraform_list_workspaces:
    permission: allow
    requires_approval: false
    audit_level: standard

  terraform_get_workspace:
    permission: allow
    requires_approval: false
    audit_level: standard

  terraform_list_runs:
    permission: allow
    requires_approval: false
    audit_level: standard

  terraform_get_run:
    permission: allow
    requires_approval: false
    audit_level: standard

  terraform_get_plan:
    permission: allow
    requires_approval: false
    audit_level: standard

  terraform_get_state:
    permission: allow
    requires_approval: false
    audit_level: standard

  terraform_list_variables:
    permission: allow
    requires_approval: false
    audit_level: standard

  terraform_list_policy_checks:
    permission: allow
    requires_approval: false
    audit_level: standard

  # Write tools - REQUIRE APPROVAL (affects infrastructure)
  terraform_create_run:
    permission: allow
    requires_approval: true
    audit_level: full
    description: Start a Terraform plan/apply

  terraform_apply_run:
    permission: allow
    requires_approval: true
    audit_level: full
    description: Apply a Terraform plan

  terraform_cancel_run:
    permission: allow
    requires_approval: true
    audit_level: full

  terraform_discard_run:
    permission: allow
    requires_approval: true
    audit_level: full

  terraform_set_variable:
    permission: allow
    requires_approval: true
    audit_level: full

  terraform_lock_workspace:
    permission: allow
    requires_approval: true
    audit_level: full

  terraform_unlock_workspace:
    permission: allow
    requires_approval: true
    audit_level: full

# Dangerous patterns
dangerous_patterns:
  - pattern: "destroy"
    description: "Terraform destroy operations"
  - pattern: "force.*unlock"
    description: "Force unlocking workspace"
  - pattern: "delete.*workspace"
    description: "Deleting workspaces"

# Credentials required
credentials:
  - TFC_TOKEN
  - TFC_ORG
  - TFC_HOST
