# NetShell MCP Policy: Prisma SD-WAN
# Palo Alto Networks Prisma SD-WAN visibility

version: 1
mcp_server: prisma-sdwan-mcp
description: Prisma SD-WAN - sites, elements, topology, alarms, BGP, policies (read-only)

# Network egress rules
network_policies:
  egress:
    - name: prisma-sase-api
      host: "*.prismaaccess.com"
      ports: [443]
      protocols: [https]
      methods: [GET, POST]

    - name: prisma-api-americas
      host: "api.sase.paloaltonetworks.com"
      ports: [443]
      protocols: [https]
      methods: [GET, POST]

    - name: prisma-api-emea
      host: "api.eu.sase.paloaltonetworks.com"
      ports: [443]
      protocols: [https]
      methods: [GET, POST]

    - name: prisma-api-apac
      host: "api.apac.sase.paloaltonetworks.com"
      ports: [443]
      protocols: [https]
      methods: [GET, POST]

    - name: prisma-auth
      host: "auth.apps.paloaltonetworks.com"
      ports: [443]
      protocols: [https]
      methods: [POST]

# Tool permissions - all read-only
tools:
  prisma_list_sites:
    permission: allow
    requires_approval: false
    audit_level: standard
    description: List SD-WAN sites

  prisma_get_site:
    permission: allow
    requires_approval: false
    audit_level: standard

  prisma_list_elements:
    permission: allow
    requires_approval: false
    audit_level: standard
    description: List SD-WAN elements (devices)

  prisma_get_element:
    permission: allow
    requires_approval: false
    audit_level: standard

  prisma_get_topology:
    permission: allow
    requires_approval: false
    audit_level: standard
    description: Get SD-WAN topology

  prisma_list_alarms:
    permission: allow
    requires_approval: false
    audit_level: standard
    description: List active alarms

  prisma_list_events:
    permission: allow
    requires_approval: false
    audit_level: standard
    description: List events

  prisma_get_interfaces:
    permission: allow
    requires_approval: false
    audit_level: standard

  prisma_get_bgp_peers:
    permission: allow
    requires_approval: false
    audit_level: standard

  prisma_get_routes:
    permission: allow
    requires_approval: false
    audit_level: standard

  prisma_list_policies:
    permission: allow
    requires_approval: false
    audit_level: standard

  prisma_list_security_zones:
    permission: allow
    requires_approval: false
    audit_level: standard

  prisma_list_applications:
    permission: allow
    requires_approval: false
    audit_level: standard

  prisma_get_status:
    permission: allow
    requires_approval: false
    audit_level: standard

# No dangerous patterns - read-only MCP
dangerous_patterns: []

# Credentials required
credentials:
  - PAN_CLIENT_ID
  - PAN_CLIENT_SECRET
  - PAN_TSG_ID
  - PAN_REGION
