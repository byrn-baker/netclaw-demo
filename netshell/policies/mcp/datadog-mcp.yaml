# NetShell MCP Policy: Datadog
# Observability platform - logs, metrics, APM, dashboards

version: 1
mcp_server: datadog-mcp
description: Datadog - logs, metrics, incidents, APM, dashboards, alerts

# Network egress rules
network_policies:
  egress:
    - name: datadog-api-us
      host: "api.datadoghq.com"
      ports: [443]
      protocols: [https]
      methods: [GET, POST, PUT, DELETE]

    - name: datadog-api-eu
      host: "api.datadoghq.eu"
      ports: [443]
      protocols: [https]
      methods: [GET, POST, PUT, DELETE]

    - name: datadog-api-us3
      host: "api.us3.datadoghq.com"
      ports: [443]
      protocols: [https]
      methods: [GET, POST, PUT, DELETE]

    - name: datadog-api-us5
      host: "api.us5.datadoghq.com"
      ports: [443]
      protocols: [https]
      methods: [GET, POST, PUT, DELETE]

    - name: datadog-mcp-endpoint
      host: "mcp.datadoghq.com"
      ports: [443]
      protocols: [https]
      methods: [GET, POST]

# Tool permissions
tools:
  # Read tools - no approval required
  datadog_search_logs:
    permission: allow
    requires_approval: false
    audit_level: standard

  datadog_query_metrics:
    permission: allow
    requires_approval: false
    audit_level: standard

  datadog_list_dashboards:
    permission: allow
    requires_approval: false
    audit_level: standard

  datadog_get_dashboard:
    permission: allow
    requires_approval: false
    audit_level: standard

  datadog_list_monitors:
    permission: allow
    requires_approval: false
    audit_level: standard

  datadog_get_monitor:
    permission: allow
    requires_approval: false
    audit_level: standard

  datadog_list_incidents:
    permission: allow
    requires_approval: false
    audit_level: standard

  datadog_get_incident:
    permission: allow
    requires_approval: false
    audit_level: standard

  datadog_list_services:
    permission: allow
    requires_approval: false
    audit_level: standard

  datadog_get_traces:
    permission: allow
    requires_approval: false
    audit_level: standard

  # Write tools - REQUIRE APPROVAL
  datadog_create_incident:
    permission: allow
    requires_approval: true
    audit_level: full

  datadog_update_incident:
    permission: allow
    requires_approval: true
    audit_level: full

  datadog_mute_monitor:
    permission: allow
    requires_approval: true
    audit_level: full

  datadog_unmute_monitor:
    permission: allow
    requires_approval: true
    audit_level: full

  datadog_create_dashboard:
    permission: allow
    requires_approval: true
    audit_level: full

# Dangerous patterns
dangerous_patterns:
  - pattern: "delete.*monitor"
    description: "Deleting monitors"
  - pattern: "delete.*dashboard"
    description: "Deleting dashboards"

# Credentials required
credentials:
  - DD_API_KEY
  - DD_APP_KEY
  - DD_SITE
