# NetShell MCP Policy: Batfish
# Offline network configuration analysis

version: 1
mcp_server: batfish-mcp
description: Batfish offline config analysis - validate configs without touching network

# Network egress rules
network_policies:
  egress:
    - name: batfish-service
      host: "${BATFISH_HOST}"
      ports: ["${BATFISH_PORT:-9997}", "9996"]
      protocols: [http]
      methods: [GET, POST, PUT, DELETE]

# Tool permissions
tools:
  # Read/analyze tools - no approval required
  batfish_upload_configs:
    permission: allow
    requires_approval: false
    audit_level: standard
    description: Upload network configs for analysis

  batfish_analyze_acl:
    permission: allow
    requires_approval: false
    audit_level: standard
    description: Analyze ACL behavior and reachability

  batfish_analyze_routing:
    permission: allow
    requires_approval: false
    audit_level: standard
    description: Analyze routing table and forwarding

  batfish_compare_configs:
    permission: allow
    requires_approval: false
    audit_level: standard
    description: Compare configuration snapshots

  batfish_validate_intent:
    permission: allow
    requires_approval: false
    audit_level: standard
    description: Validate network intent policies

# No dangerous commands - Batfish is offline analysis only
dangerous_patterns: []

# Credentials required
credentials:
  - BATFISH_HOST
  - BATFISH_PORT
