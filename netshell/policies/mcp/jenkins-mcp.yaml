# NetShell MCP Policy: Jenkins
# Jenkins CI/CD operations

version: 1
mcp_server: jenkins-mcp
description: Jenkins - jobs, builds, pipelines, queues

# Network egress rules
network_policies:
  egress:
    - name: jenkins-server
      host: "${JENKINS_URL}"
      ports: [443, 8080]
      protocols: [https, http]
      methods: [GET, POST]

# Tool permissions
tools:
  # Read tools - no approval required
  jenkins_list_jobs:
    permission: allow
    requires_approval: false
    audit_level: standard

  jenkins_get_job:
    permission: allow
    requires_approval: false
    audit_level: standard

  jenkins_list_builds:
    permission: allow
    requires_approval: false
    audit_level: standard

  jenkins_get_build:
    permission: allow
    requires_approval: false
    audit_level: standard

  jenkins_get_build_log:
    permission: allow
    requires_approval: false
    audit_level: standard

  jenkins_get_queue:
    permission: allow
    requires_approval: false
    audit_level: standard

  jenkins_get_nodes:
    permission: allow
    requires_approval: false
    audit_level: standard

  # Write tools - REQUIRE APPROVAL
  jenkins_trigger_build:
    permission: allow
    requires_approval: true
    audit_level: full
    description: Trigger a Jenkins job

  jenkins_abort_build:
    permission: allow
    requires_approval: true
    audit_level: full
    description: Abort a running build

  jenkins_create_job:
    permission: allow
    requires_approval: true
    audit_level: full
    description: Create a new job

  jenkins_delete_job:
    permission: allow
    requires_approval: true
    audit_level: full
    description: Delete a job

# Dangerous patterns
dangerous_patterns:
  - pattern: "delete.*job"
    description: "Deleting Jenkins jobs"
  - pattern: "disable.*job"
    description: "Disabling Jenkins jobs"

# Credentials required
credentials:
  - JENKINS_URL
  - JENKINS_AUTH_BASE64
