# NetShell MCP Policy: GitLab
# GitLab DevOps operations

version: 1
mcp_server: gitlab-mcp
description: GitLab - repos, issues, merge requests, pipelines, CI/CD

# Network egress rules
network_policies:
  egress:
    - name: gitlab-api
      host: "${GITLAB_API_URL:-gitlab.com}"
      ports: [443]
      protocols: [https]
      methods: [GET, POST, PUT, PATCH, DELETE]

# Tool permissions
tools:
  # Read tools - no approval required
  gitlab_list_projects:
    permission: allow
    requires_approval: false
    audit_level: standard

  gitlab_get_project:
    permission: allow
    requires_approval: false
    audit_level: standard

  gitlab_list_branches:
    permission: allow
    requires_approval: false
    audit_level: standard

  gitlab_list_merge_requests:
    permission: allow
    requires_approval: false
    audit_level: standard

  gitlab_get_merge_request:
    permission: allow
    requires_approval: false
    audit_level: standard

  gitlab_list_pipelines:
    permission: allow
    requires_approval: false
    audit_level: standard

  gitlab_get_pipeline:
    permission: allow
    requires_approval: false
    audit_level: standard

  gitlab_list_issues:
    permission: allow
    requires_approval: false
    audit_level: standard

  gitlab_get_file:
    permission: allow
    requires_approval: false
    audit_level: standard

  # Write tools - REQUIRE APPROVAL
  gitlab_create_issue:
    permission: allow
    requires_approval: true
    audit_level: full

  gitlab_create_merge_request:
    permission: allow
    requires_approval: true
    audit_level: full

  gitlab_merge_merge_request:
    permission: allow
    requires_approval: true
    audit_level: full

  gitlab_create_branch:
    permission: allow
    requires_approval: true
    audit_level: full

  gitlab_trigger_pipeline:
    permission: allow
    requires_approval: true
    audit_level: full

  gitlab_cancel_pipeline:
    permission: allow
    requires_approval: true
    audit_level: full

# Dangerous patterns
dangerous_patterns:
  - pattern: "force.*push"
    description: "Force push can overwrite history"
  - pattern: "delete.*branch.*main"
    description: "Deleting main/master branch"
  - pattern: "delete.*branch.*master"
    description: "Deleting main/master branch"

# Credentials required
credentials:
  - GITLAB_PERSONAL_ACCESS_TOKEN
  - GITLAB_API_URL
