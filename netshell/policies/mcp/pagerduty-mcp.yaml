# NetShell MCP Policy: PagerDuty
# Incident management platform

version: 1
mcp_server: pagerduty-mcp
description: PagerDuty - incidents, on-call, services, escalation policies

# Network egress rules
network_policies:
  egress:
    - name: pagerduty-api
      host: "api.pagerduty.com"
      ports: [443]
      protocols: [https]
      methods: [GET, POST, PUT, DELETE]

    - name: pagerduty-events
      host: "events.pagerduty.com"
      ports: [443]
      protocols: [https]
      methods: [POST]

# Tool permissions
tools:
  # Read tools - no approval required
  pagerduty_list_incidents:
    permission: allow
    requires_approval: false
    audit_level: standard

  pagerduty_get_incident:
    permission: allow
    requires_approval: false
    audit_level: standard

  pagerduty_list_services:
    permission: allow
    requires_approval: false
    audit_level: standard

  pagerduty_list_users:
    permission: allow
    requires_approval: false
    audit_level: standard

  pagerduty_get_oncall:
    permission: allow
    requires_approval: false
    audit_level: standard

  pagerduty_list_escalation_policies:
    permission: allow
    requires_approval: false
    audit_level: standard

  pagerduty_list_schedules:
    permission: allow
    requires_approval: false
    audit_level: standard

  # Write tools - REQUIRE APPROVAL
  pagerduty_create_incident:
    permission: allow
    requires_approval: true
    audit_level: full
    description: Create a new incident

  pagerduty_acknowledge_incident:
    permission: allow
    requires_approval: true
    audit_level: full

  pagerduty_resolve_incident:
    permission: allow
    requires_approval: true
    audit_level: full

  pagerduty_reassign_incident:
    permission: allow
    requires_approval: true
    audit_level: full

  pagerduty_add_note:
    permission: allow
    requires_approval: true
    audit_level: full

  pagerduty_trigger_event:
    permission: allow
    requires_approval: true
    audit_level: full

# Dangerous patterns
dangerous_patterns:
  - pattern: "delete.*service"
    description: "Deleting PagerDuty services"
  - pattern: "delete.*schedule"
    description: "Deleting on-call schedules"

# Credentials required
credentials:
  - PAGERDUTY_USER_API_KEY
  - PAGERDUTY_API_HOST
