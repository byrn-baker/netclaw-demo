# Vector config for NetClaw Demo VMs
# Tails OpenClaw trajectory JSONL files, extracts token usage from model.completed entries,
# and pushes metrics to Prometheus via remote-write.

data_dir: /var/lib/vector

sources:
  openclaw_trajectory:
    type: file
    include:
      - /home/ubuntu/.openclaw/agents/*/sessions/*.trajectory.jsonl
    read_from: beginning
    max_line_bytes: 1048576
    fingerprint:
      strategy: device_and_inode
    glob_minimum_cooldown_ms: 5000

transforms:
  parse_and_extract:
    type: remap
    inputs:
      - openclaw_trajectory
    source: |
      parsed = parse_json!(.message)

      # Only process model.completed events
      if string!(parsed.type) != "model.completed" {
        abort
      }

      # Extract usage data — use fallible access with defaults
      usage = parsed.data.usage

      input_tokens = int(usage.input) ?? 0
      output_tokens = int(usage.output) ?? 0

      # Skip events with zero usage (empty heartbeat completions have usage:{})
      if input_tokens == 0 && output_tokens == 0 {
        abort
      }

      cache_read = int(usage.cacheRead) ?? 0
      cache_write = int(usage.cacheWrite) ?? 0
      total = int(usage.total) ?? 0

      # Model and provider
      .model = string!(parsed.modelId)
      .provider = string!(parsed.provider)
      .input_tokens = input_tokens
      .output_tokens = output_tokens
      .cache_read_tokens = cache_read
      .cache_write_tokens = cache_write
      .total_tokens = total

      # Cost estimation (per 1M tokens, USD)
      # Sonnet: input=3, output=15, cache_read=0.30, cache_write=3.75
      # Opus: input=15, output=75, cache_read=1.50, cache_write=18.75
      # Haiku: input=1, output=5, cache_read=0.10, cache_write=1.25
      input_f = to_float(input_tokens)
      output_f = to_float(output_tokens)
      cr_f = to_float(cache_read)
      cw_f = to_float(cache_write)
      m = 1000000.0

      if contains(string!(parsed.modelId), "opus") {
        .cost_usd = (input_f * 15.0 + output_f * 75.0 + cr_f * 1.5 + cw_f * 18.75) / m
      } else if contains(string!(parsed.modelId), "haiku") {
        .cost_usd = (input_f * 1.0 + output_f * 5.0 + cr_f * 0.1 + cw_f * 1.25) / m
      } else {
        .cost_usd = (input_f * 3.0 + output_f * 15.0 + cr_f * 0.3 + cw_f * 3.75) / m
      }

  metric_input_tokens:
    type: log_to_metric
    inputs:
      - parse_and_extract
    metrics:
      - type: counter
        field: input_tokens
        name: netclaw_model_input_tokens_total
        namespace: ""
        tags:
          model: "{{model}}"
          provider: "{{provider}}"
          instance: "netclaw-demo"

  metric_output_tokens:
    type: log_to_metric
    inputs:
      - parse_and_extract
    metrics:
      - type: counter
        field: output_tokens
        name: netclaw_model_output_tokens_total
        namespace: ""
        tags:
          model: "{{model}}"
          provider: "{{provider}}"
          instance: "netclaw-demo"

  metric_cache_read:
    type: log_to_metric
    inputs:
      - parse_and_extract
    metrics:
      - type: counter
        field: cache_read_tokens
        name: netclaw_model_cache_read_tokens_total
        namespace: ""
        tags:
          model: "{{model}}"
          provider: "{{provider}}"
          instance: "netclaw-demo"

  metric_cache_write:
    type: log_to_metric
    inputs:
      - parse_and_extract
    metrics:
      - type: counter
        field: cache_write_tokens
        name: netclaw_model_cache_write_tokens_total
        namespace: ""
        tags:
          model: "{{model}}"
          provider: "{{provider}}"
          instance: "netclaw-demo"

  metric_cost:
    type: log_to_metric
    inputs:
      - parse_and_extract
    metrics:
      - type: counter
        field: cost_usd
        name: netclaw_model_cost_usd_total
        namespace: ""
        tags:
          model: "{{model}}"
          provider: "{{provider}}"
          instance: "netclaw-demo"

  metric_calls:
    type: log_to_metric
    inputs:
      - parse_and_extract
    metrics:
      - type: counter
        field: input_tokens
        name: netclaw_model_calls_total
        namespace: ""
        increment_by_value: false
        tags:
          model: "{{model}}"
          provider: "{{provider}}"
          instance: "netclaw-demo"

  metric_total:
    type: log_to_metric
    inputs:
      - parse_and_extract
    metrics:
      - type: counter
        field: total_tokens
        name: netclaw_model_total_tokens
        namespace: ""
        tags:
          model: "{{model}}"
          provider: "{{provider}}"
          instance: "netclaw-demo"

sinks:
  prometheus_remote_write:
    type: prometheus_remote_write
    inputs:
      - metric_input_tokens
      - metric_output_tokens
      - metric_cache_read
      - metric_cache_write
      - metric_cost
      - metric_calls
      - metric_total
    endpoint: "http://your-obs-host:9090/api/v1/write"
    healthcheck:
      enabled: false
