frr version 8.4_git
frr defaults traditional
hostname pe1
no ipv6 forwarding
!
interface eth1
 ip address 10.0.1.1/30
 ip ospf area 0.0.0.0
 ip ospf network point-to-point
exit
!
interface lo
 ip address 10.255.255.1/32
 ip ospf area 0.0.0.0
exit
!
router bgp 65000
 bgp router-id 10.255.255.1
 neighbor 10.255.255.2 remote-as 65000
 neighbor 10.255.255.2 update-source lo
 neighbor 10.255.255.6 remote-as 65000
 neighbor 10.255.255.6 update-source lo
 !
 address-family ipv4 unicast
  network 10.255.255.1/32
 exit-address-family
exit
!
router ospf
 ospf router-id 10.255.255.1
exit
!
