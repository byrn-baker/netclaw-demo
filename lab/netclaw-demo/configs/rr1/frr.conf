frr version 8.4_git
frr defaults traditional
hostname rr1
no ipv6 forwarding
!
interface eth1
 ip address 10.0.4.2/30
 ip ospf area 0.0.0.0
 ip ospf network point-to-point
exit
!
interface lo
 ip address 10.255.255.6/32
 ip ospf area 0.0.0.0
 ip ospf passive
exit
!
router bgp 65000
 bgp router-id 10.255.255.6
 no bgp ebgp-requires-policy
 neighbor IBGP peer-group
 neighbor IBGP remote-as 65000
 neighbor IBGP update-source lo
 neighbor 10.255.255.2 peer-group IBGP
 neighbor 10.255.255.3 peer-group IBGP
 neighbor 10.255.255.4 peer-group IBGP
 neighbor 10.255.255.5 peer-group IBGP
 neighbor 10.255.255.1 remote-as 65000
 neighbor 10.255.255.1 update-source lo
 !
 address-family ipv4 unicast
  network 10.255.255.6/32
  neighbor IBGP route-reflector-client
 exit-address-family
exit
!
router ospf
 ospf router-id 10.255.255.6
exit
!
